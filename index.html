<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthday ❤️</title>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>
body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#0b0b14,#1c1c2e);
color:white;
font-family:Arial;
overflow:hidden;
}

.page{display:none;text-align:center;padding:20px;}
.active{display:block;}

button{
padding:12px 25px;
margin:10px;
border:none;
border-radius:10px;
cursor:pointer;
font-size:16px;
}

#yes{background:#ff4da6;color:white;}
#no{background:#444;color:white;position:relative;}

.typing{
white-space:pre-wrap;
border-right:2px solid white;
}

.final{
opacity:0;
transition:1.5s;
font-size:22px;
margin-top:20px;
}

.show{
opacity:1;
color:#ffb3d9;
font-size:26px;
font-weight:bold;
}
</style>
</head>

<body>

<!-- PAGE 1 -->
<div class="page active" id="page1">
<h2>Are you ready? ❤️</h2>
<button id="yes">YES</button>
<button id="no">NO</button>
</div>

<!-- PAGE 2 -->
<div class="page" id="page2">
<h2>✨ I knew you'd say YES</h2>
<div id="msg" class="typing"></div>
</div>

<!-- PAGE 3 -->
<div class="page" id="page3">
<div>🎉💻🎂🎁🚀</div>
<div id="final" class="final">
Out of all the people I could have met, I'm really glad I met you. ❤️
</div>
</div>

<script>

/* NO BUTTON */
const no=document.getElementById("no");
let scale=1;

no.addEventListener("mouseover",()=>{
no.style.position="absolute";
no.style.top=Math.random()*80+"%";
no.style.left=Math.random()*80+"%";

scale-=0.05;
if(scale>0.3){
no.style.transform=`scale(${scale})`;
}
});

/* YES CLICK */
document.getElementById("yes").onclick=()=>{
document.getElementById("page1").classList.remove("active");
document.getElementById("page2").classList.add("active");

confetti({
particleCount:120,
spread:100,
origin:{y:0.6}
});

typeWriter();
};

/* الرسالة (مضمونة) */
const text = `Hey love ❤️,
Happy Birthday! 🎉🎂

I can't believe this is our first birthday together, and it makes me so happy to be a part of your special day.

I wanted to create this little surprise just for you, because you deserve something made with love and care. ✨

Thank you for all the smiles, the conversations, the support, and the beautiful moments we've shared.

I admire your passion, your determination, and your way of chasing your dreams 💻🚀

Enjoy your day, my favorite programmer. 💙

P.S. This is our first birthday together... and hopefully many more ❤️`;

function typeWriter(){
let i=0;
let msg=document.getElementById("msg");

function typing(){
if(i<text.length){
msg.innerHTML+=text.charAt(i);
i++;
setTimeout(typing,15);
}else{
setTimeout(showFinal,1000);
}
}
typing();
}

/* PAGE 3 */
function showFinal(){
document.getElementById("page2").classList.remove("active");
document.getElementById("page3").classList.add("active");

setTimeout(()=>{
document.getElementById("final").classList.add("show");
},1500);
}

</script>

</body>
</html>
