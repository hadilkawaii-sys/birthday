<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Birthday Build ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins', sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#0b0b14,#1c1c2e);
color:white;
overflow:hidden;
}

/* ===== BOOT SCREEN ===== */
#boot{
position:absolute;
width:100%;
height:100%;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
background:#0b0b14;
z-index:10;
}

.boot-text{
font-family: monospace;
color:#ff9ecb;
margin:5px;
}

/* ===== GENERAL ===== */
.page{
display:none;
text-align:center;
padding:20px;
max-width:750px;
}

.active{
display:block;
}

/* ===== BUTTONS ===== */
button{
padding:12px 25px;
margin:10px;
border:none;
border-radius:12px;
cursor:pointer;
font-size:16px;
transition:0.3s;
}

#yes{
background:#ff4da6;
color:white;
}

#no{
background:#444;
color:white;
position:relative;
}

/* ===== TYPE EFFECT ===== */
.typing{
white-space:pre-wrap;
border-right:2px solid white;
overflow:hidden;
}

/* ===== FINAL LINE ===== */
.final-line{
margin-top:25px;
font-size:20px;
opacity:0;
transition:2s;
}

.show-final{
opacity:1;
font-size:26px;
color:#ffb3d9;
font-weight:bold;
}

/* subtle glow */
.glow{
text-shadow:0 0 10px #ff4da6;
}

</style>
</head>

<body>

<!-- BOOT -->
<div id="boot">
<div class="boot-text">Booting birthday system...</div>
<div class="boot-text">Loading emotions module...</div>
<div class="boot-text">Initializing love.exe ❤️</div>
</div>

<!-- PAGE 1 -->
<div class="page active" id="page1">
<h2 class="glow">I have something important to tell you...</h2>
<h3>Are you ready? 💻❤️</h3>

<button id="yes">YES</button>
<button id="no">NO</button>
</div>

<!-- PAGE 2 -->
<div class="page" id="page2">
<h2>✨ I knew you would say YES</h2>
<div id="msg" class="typing"></div>
</div>

<!-- PAGE 3 -->
<div class="page" id="page3">
<div id="finalText"></div>

<div class="final-line" id="finalLine">
Out of all the people I could have met, I'm really glad I met you. ❤️
</div>
</div>

<script>

/* ===== BOOT TIMER ===== */
setTimeout(()=>{
document.getElementById("boot").style.display="none";
},3000);

/* ===== NO BUTTON ESCAPE ===== */
const noBtn = document.getElementById("no");
let scale = 1;
let runaway = 0;

noBtn.addEventListener("mouseover", ()=>{
noBtn.style.position="absolute";
noBtn.style.top=Math.random()*80+"%";
noBtn.style.left=Math.random()*80+"%";

scale -= 0.08;
if(scale>0.3){
noBtn.style.transform=`scale(${scale})`;
}

runaway++;
if(runaway>6){
noBtn.innerText="ERROR";
noBtn.style.opacity="0.3";
}
});

/* ===== YES CLICK ===== */
document.getElementById("yes").onclick = ()=>{
document.getElementById("page1").classList.remove("active");
document.getElementById("page2").classList.add("active");

confetti({
particleCount:150,
spread:120,
origin:{y:0.6}
});

typeWriter();
};

/* ===== TYPEWRITER ===== */
const text = `Hey love ❤️,
Happy Birthday! 🎉🎂

I can't believe this is our first birthday together, and it makes me so happy to be a part of your special day.

I wanted to create this little surprise just for you, because you deserve something made with love and care. ✨

Thank you for all the smiles, the conversations, the support, and the beautiful moments we've shared. You mean so much more to me than words can explain.

I admire your passion, your determination, and the way you keep working hard for your dreams. 💻🚀

On your birthday, I wish you happiness, success, good health, and everything you've been hoping for.

And honestly, I may not be able to give you a gift that matches your worth, but I wanted to create this whole page just so you would know how special you are to me. ❤️

Enjoy your day, my favorite programmer. 💙

P.S. This is our first birthday together... and hopefully the first of many. ❤️`;

function typeWriter(){
let i=0;
let speed=18;
let msg=document.getElementById("msg");

function typing(){
if(i<text.length){
msg.innerHTML+=text.charAt(i);
i++;
setTimeout(typing,speed);
}
else{
setTimeout(showFinal,1500);
}
}
typing();
}

/* ===== PAGE 3 ===== */
function showFinal(){
document.getElementById("page2").classList.remove("active");
document.getElementById("page3").classList.add("active");

document.getElementById("finalText").innerHTML="🎉💻🎂🎁🚀";

setTimeout(()=>{
document.getElementById("finalLine").classList.add("show-final");
},2500);
}

</script>

</body>
</html>
