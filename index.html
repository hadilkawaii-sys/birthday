<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Birthday Build ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins', sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#0b0b14,#1c1c2e);
color:white;
overflow:hidden;
}

/* BOOT */
#boot{
position:fixed;
inset:0;
background:#0b0b14;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:10;
}

.boot{
font-family:monospace;
color:#ff9ecb;
margin:5px;
}

/* PAGES */
.page{
display:none;
text-align:center;
padding:20px;
max-width:750px;
}

.active{
display:block;
}

/* BUTTONS */
button{
padding:12px 25px;
margin:10px;
border:none;
border-radius:12px;
cursor:pointer;
font-size:16px;
transition:0.3s;
}

#yes{
background:#ff4da6;
color:white;
}

#no{
background:#444;
color:white;
position:relative;
}

/* TYPEWRITER */
.typing{
white-space:pre-wrap;
border-right:2px solid white;
overflow:hidden;
}

/* FINAL LINE */
.final{
margin-top:25px;
font-size:20px;
opacity:0;
transition:2s;
}

.show{
opacity:1;
font-size:26px;
color:#ffb3d9;
font-weight:bold;
text-shadow:0 0 10px #ff4da6;
}
</style>
</head>

<body>

<!-- BOOT SCREEN -->
<div id="boot">
<div class="boot">Booting birthday system...</div>
<div class="boot">Loading emotions module...</div>
<div class="boot">Initializing love.exe ❤️</div>
</div>

<!-- PAGE 1 -->
<div class="page active" id="page1">
<h2>I have something for you...</h2>
<h3>Are you ready? 💻❤️</h3>

<button id="yes">YES</button>
<button id="no">NO</button>
</div>

<!-- PAGE 2 -->
<div class="page" id="page2">
<h2>✨ I knew you'd say YES</h2>
<div id="msg" class="typing"></div>
</div>

<!-- PAGE 3 -->
<div class="page" id="page3">
<div style="font-size:22px;">🎉🎂🎁💻🚀</div>

<div class="final" id="finalLine">
Out of all the people I could have met, I'm really glad I met you. ❤️
</div>
</div>

<script>

/* BOOT */
setTimeout(()=>{
document.getElementById("boot").style.display="none";
},2500);

/* NO BUTTON ESCAPE */
const noBtn=document.getElementById("no");
let scale=1;

noBtn.addEventListener("mouseover",()=>{
noBtn.style.position="absolute";
noBtn.style.top=Math.random()*80+"%";
noBtn.style.left=Math.random()*80+"%";

scale-=0.07;
if(scale>0.3){
noBtn.style.transform=`scale(${scale})`;
}
});

/* YES CLICK */
document.getElementById("yes").onclick=()=>{
document.getElementById("page1").classList.remove("active");
document.getElementById("page2").classList.add("active");

confetti({
particleCount:150,
spread:120,
origin:{y:0.6}
});

typeWriter();
};

/* YOUR FULL MESSAGE (UNCHANGED) */
const text = `Hey love ❤️,
Happy Birthday! 🎉🎂

I can't believe this is our first birthday together, and it makes me so happy to be a part of your special day.

I wanted to create this little surprise just for you, because you deserve something made with love and care. ✨

Thank you for all the smiles, the conversations, the support, and the beautiful moments we've shared. You mean so much more to me than words can explain.

I admire your passion, your determination, and the way you keep working hard for your dreams. 💻🚀

On your birthday, I wish you happiness, success, good health, and everything you've been hoping for.

And honestly, I may not be able to give you a gift that matches your worth, but I wanted to create this whole page just so you would know how special you are to me. ❤️

Enjoy your day, my favorite programmer. 💙

P.S. This is our first birthday together... and hopefully the first of many. ❤️`;

function typeWriter(){
let i=0;
let msg=document.getElementById("msg");

function typing(){
if(i<text.length){
msg.innerHTML+=text.charAt(i);
i++;
setTimeout(typing,18);
}
else{
setTimeout(showPage3,1200);
}
}
typing();
}

/* PAGE 3 */
function showPage3(){
document.getElementById("page2").classList.remove("active");
document.getElementById("page3").classList.add("active");

setTimeout(()=>{
document.getElementById("finalLine").classList.add("show");
},2000);
}

</script>

</body>
</html>
